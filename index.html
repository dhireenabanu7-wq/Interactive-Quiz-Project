<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Master Pro</title>
</head>
<body>
    <div class="container"></div>

    <div id="homeScreen"></div>

    <h1>🧠 Quiz Master Pro</h1>

    <p class="subtitle">
        Challenge yourself and become a Quiz Legend
    </p>

    <input type="text" id="playerName" placeholder="Enter Your Name">

    <h3>Select Category</h3>

    <div class="category-grid">

    <button class="category">
    JavaScript
    </button>

    <button class="category">
    HTML & CSS
    </button>

    <button class="category">
    Java
    </button>

    <button class="category">
    General Knowledge
    </button>

    </div>

    <h3>Select Difficulty</h3>

    <div class="difficulty-grid">

    <button class="difficulty">
    Easy
    </button>

    <button class="difficulty">
    Medium
    </button>

    <button class="difficulty">
    Hard
    </button>

    </div>

    <button id="startQuizBtn">
    Start Quiz 🚀
    </button>
    
    <div id="quizScreen" class="hidden"></div>

    <div class="quiz-top">

    <div id="welcomeUser"></div>

        <div id="timer">
        ⏱ 15
        </div>

    </div>

    <div class="progress-container">
    <div id="progressBar"></div>
    </div>

    <div class="question-info">

    <span id="questionCounter"></span>

    <span id="scoreCounter">
    Score: 0
    </span>

    </div>

    <h2 id="question"></h2>

    <div id="options"></div>

    <button id="nextBtn">
    Next Question →
    </button>

    <h3>Question Navigator</h3>

    <div id="navigator"></div>
</body>
</html>
